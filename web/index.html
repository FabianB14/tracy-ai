<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#05060a" />
  <title>Tracy — Interverse Assistant</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- Access gate — shown only when the server requires a key (AUTH_SECRET set) -->
  <div id="gate" class="gate" hidden>
    <div class="gate-card">
      <div class="gate-mark" aria-hidden="true"></div>
      <div class="gate-title">TRACY</div>
      <div class="gate-sub">Enter your access key to continue.</div>
      <input id="gate-key" class="gate-input" type="text" autocomplete="off" spellcheck="false"
             placeholder="tracy-xxxx-xxxx-xxxx" />
      <button id="gate-enter" class="primary-btn gate-enter">Enter</button>
      <div id="gate-error" class="gate-error" aria-live="polite"></div>
    </div>
  </div>

  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">TRACY</span>
        <span class="brand-sub">INTERVERSE</span>
      </div>
      <div class="topbar-right">
        <label class="surface-picker">
          <select id="surface" aria-label="Surface">
            <option value="desktop">Desktop</option>
            <option value="mobile">Mobile</option>
            <option value="developers">Game Studios</option>
            <option value="newhire">New Hire</option>
            <option value="admin">Admin</option>
          </select>
        </label>
        <button id="mute-btn" class="icon-btn mute-btn" aria-label="Toggle voice" title="Toggle Tracy's voice">🔊</button>
        <span id="status-dot" class="status-dot" title="Connection status"></span>
        <button id="settings-btn" class="icon-btn" aria-label="Settings" title="Settings">⚙</button>
      </div>
    </header>

    <!-- Install prompt (mobile only; shown by install.js when installable) -->
    <div id="install-bar" class="install-bar" hidden>
      <img class="install-icon" src="./icon-192.png" alt="" width="40" height="40" />
      <div class="install-text">
        <strong>Install Tracy</strong>
        <span id="install-sub">Add her to your home screen for a full-screen app.</span>
      </div>
      <button id="install-action" class="install-btn" type="button">Install</button>
      <button id="install-close" class="install-x" type="button" aria-label="Dismiss">✕</button>
    </div>

    <!-- Tracy presence: the orb + live captions -->
    <section class="stage">
      <div id="orb" class="orb" aria-hidden="true">
        <div class="orb-core"></div>
        <div class="orb-ring"></div>
        <div class="orb-ring orb-ring-2"></div>
      </div>
      <div id="caption" class="caption" aria-live="polite"></div>
    </section>

    <!-- Transcript -->
    <main id="transcript" class="transcript" aria-live="polite"></main>

    <!-- Input bar -->
    <footer class="composer">
      <button id="handsfree-btn" class="hf-btn" aria-label="Hands-free open mic"
              title="Hands-free — keep the conversation going without pressing the mic">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path fill="currentColor" d="M12 3a7 7 0 0 0-7 7v3H4a1 1 0 0 0-1 1v3a2 2 0 0 0 2 2h2v-6H7v-3a5 5 0 0 1 10 0v3h-2v6h2a2 2 0 0 0 2-2v-3a1 1 0 0 0-1-1h-1v-3a7 7 0 0 0-7-7z"/>
        </svg>
      </button>
      <button id="mic-btn" class="mic-btn" aria-label="Speak" title="Tap to talk (one message)">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path fill="currentColor" d="M12 15a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3z"/>
          <path fill="currentColor" d="M19 12a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V24h2v-3.06A9 9 0 0 0 21 12h-2z"/>
        </svg>
      </button>
      <input id="input" class="text-input" type="text" autocomplete="off"
             placeholder="Talk to Tracy…" />
      <button id="send-btn" class="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path fill="currentColor" d="M3 11l18-8-8 18-2-7-8-3z"/>
        </svg>
      </button>
    </footer>
  </div>

  <!-- Settings modal -->
  <div id="settings" class="modal" hidden>
    <div class="modal-card">
      <h2>Settings</h2>
      <label>Backend URL
        <input id="cfg-backend" type="url" placeholder="https://tracy-ai.onrender.com" />
      </label>
      <label>User ID
        <input id="cfg-user" type="text" spellcheck="false" autocomplete="off" />
        <small class="hint">Your identity to Tracy — keys your memory, check-ins, and admin access. Set it to the same value on every browser/device you use (e.g. an ID your admin assigned) so you stay recognized everywhere.</small>
      </label>

      <div class="cfg-section">App &amp; notifications</div>
      <div class="install-row">
        <div class="install-text">
          <strong>Install Tracy</strong>
          <span id="cfg-install-hint" class="hint"></span>
        </div>
        <button id="cfg-install-btn" class="ghost-btn" type="button" hidden>Install</button>
      </div>
      <label class="row">
        <span>Notify me on this device</span>
        <input id="cfg-push" type="checkbox" />
      </label>
      <small id="cfg-push-status" class="hint"></small>
      <label>Your Anthropic API key (optional)
        <input id="cfg-apikey" type="password" autocomplete="off" spellcheck="false"
               placeholder="sk-ant-…  (blank = use the shared key)" />
        <small class="hint">Use your own key so usage bills your Anthropic account. Stored only in this browser, sent straight to the backend. Get one at console.anthropic.com — a Claude Pro/Max subscription is not an API key.</small>
      </label>
      <label class="row">
        <input id="cfg-autospeak" type="checkbox" /> Speak Tracy's replies aloud
      </label>
      <label class="row">
        <input id="cfg-autosend" type="checkbox" /> Auto-send after voice input
      </label>
      <label class="row">
        <input id="cfg-handsfree" type="checkbox" /> Hands-free (open mic)
      </label>
      <label>Voice
        <select id="cfg-voice"></select>
      </label>
      <label>Speed <span id="cfg-rate-val" class="rangeval"></span>
        <input id="cfg-rate" type="range" min="0.6" max="1.4" step="0.05" />
      </label>
      <label>Pitch <span id="cfg-pitch-val" class="rangeval"></span>
        <input id="cfg-pitch" type="range" min="0.6" max="1.4" step="0.05" />
      </label>
      <label>Pause before I send <span id="cfg-silence-val" class="rangeval"></span>
        <input id="cfg-silence" type="range" min="1" max="6" step="0.5" />
        <small class="hint">How long to wait after you stop talking before sending. Longer = more time to finish your thought.</small>
      </label>
      <label>Voice corrections
        <textarea id="cfg-corrections" rows="4" spellcheck="false"
          placeholder="heard = meant (one per line)&#10;e.g. chico = Chicco"></textarea>
        <small class="hint">Tracy also learns these automatically when you fix a transcript before sending.</small>
      </label>

      <div class="cfg-section">Daily check-ins</div>
      <label>Email for check-ins
        <input id="cfg-notify-email" type="email" autocomplete="email" spellcheck="false"
          placeholder="you@example.com" />
        <small class="hint">Where Tracy emails your daily summary. Requires email to be set up on the server.</small>
      </label>
      <div id="cfg-apps" class="cfg-apps"></div>
      <label class="row">
        <span>Email me a daily check-in</span>
        <input id="cfg-digest" type="checkbox" />
      </label>
      <div class="modal-actions" style="justify-content:flex-start;gap:8px">
        <button id="cfg-notify-save" class="ghost-btn" type="button">Save check-ins</button>
        <button id="cfg-notify-test" class="ghost-btn" type="button">Send test now</button>
      </div>
      <small id="cfg-notify-status" class="hint"></small>

      <div class="cfg-section">Tracy's learning</div>
      <small id="cfg-kb-stats" class="hint">—</small>

      <div class="modal-actions">
        <button id="cfg-clear" class="ghost-btn">Clear chat</button>
        <button id="cfg-save" class="primary-btn">Done</button>
      </div>
    </div>
  </div>

  <script src="./native.bundle.js"></script>
  <script src="./config.js"></script>
  <script src="./corrections.js"></script>
  <script src="./app.js"></script>
  <script src="./install.js"></script>
</body>
</html>
